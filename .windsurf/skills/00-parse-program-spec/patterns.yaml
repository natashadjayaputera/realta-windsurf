        type: button
        text: "Cancel"
        events:
          on_click:
            - close_popup: POPUP_RAPID_COMMIT
      - element_id: popup_rapid_commit_progress_bar
        type: progress_bar

    processes:
      - process_id: INITIAL_PROCESS
        category: initialization
        validations: []
        action:
          - front:
              - set_var:
                  name: VAR_POPUP_RAPID_COMMIT_LIST
                  value: empty list
              - set_var:
                  name: VAR_COMPANY_ID
                  value: "VAR_COMPANY_ID from JOURNAL_LIST"
              - set_var:
                  name: VAR_USER_ID
                  value: "VAR_USER_ID from JOURNAL_LIST"
              - set_var:
                  name: VAR_TRANS_CODE
                  value: "VAR_TRANS_CODE from JOURNAL_LIST"
              - set_var:
                  name: VAR_LANGUAGE_ID
                  value: "VAR_LANGUAGE_ID from JOURNAL_LIST"
              - set_var:
                  name: VAR_DEPT_CODE
                  value: "VAR_FILTER.CDEPT_CODE from JOURNAL_LIST"
              - set_var:
                  name: VAR_DEPT_NAME
                  value: "VAR_FILTER.CDEPT_NAME from JOURNAL_LIST"
              - set_var:
                  name: VAR_JOURNAL_PERIOD_YY
                  value: "VAR_FILTER.CJOURNAL_PERIOD_YY from JOURNAL_LIST"
              - set_var:
                  name: VAR_JOURNAL_PERIOD_MM
                  value: "VAR_FILTER.CJOURNAL_PERIOD_MM from JOURNAL_LIST"
              - set_var:
                  name: VAR_JOURNAL_STATUS
                  value: "20"
              - set_var:
                  name: VAR_JOURNAL_STATUS_DISPLAY
                  value: "Approved"
          - back:
              - run_stored_procedure:
                  name: RSP_GL_SEARCH_JOURNAL_LIST
                  parameters:
                    - VAR_COMPANY_ID
                    - VAR_USER_ID
                    - VAR_TRANS_CODE
                    - VAR_DEPT_CODE
                    - "VAR_JOURNAL_PERIOD_YY + VAR_JOURNAL_PERIOD_MM"
                    - VAR_JOURNAL_STATUS
                    - ""
                    - VAR_LANGUAGE_ID
                  save_to: VAR_POPUP_RAPID_COMMIT_LIST
      - process_id: COMMIT_PROCESS
        category: batch-function
        validations:
          - set_var:
              name: VAR_DATA_COUNT
              value: "Total rows in VAR_POPUP_RAPID_COMMIT_LIST with LSELECTED = TRUE"
          - field: VAR_DATA_COUNT
            conditions: 0
            message: "Please select Journal to commit!"
        action:
          - back:
              - start_batch_process
              - set_var:
                  name: VAR_STEP
                  value: 0
              - set_var:
                  name: VAR_ERROR_COUNT
                  value: 0
              - set_var:
                  name: VAR_KEY_GUID
                  value: "New Guid"
              - run_stored_procedure:
                  name: RSP_WRITEUPLOADPROCESSSTATUS
                  parameters:
                    - VAR_COMPANY_ID
                    - VAR_USER_ID
                    - VAR_KEY_GUID
                    - VAR_STEP
                    - "Start Committing Reversing Journal"
                    - 0
              - loop:
                  through: VAR_POPUP_RAPID_COMMIT_LIST
                  as: CURRENT_ROW
                  actions:
                    - set_var:
                        name: VAR_STEP
                        value: "VAR_STEP + 1"
                    - run_stored_procedure:
                        name: RSP_WRITEUPLOADPROCESSSTATUS
                        parameters:
                          - VAR_COMPANY_ID
                          - VAR_USER_ID
                          - VAR_KEY_GUID
                          - VAR_STEP
                          - "Processing data {VAR_STEP} of {VAR_DATA_COUNT}"
                          - 0
                    - run_stored_procedure:
                        name: RSP_GL_UPDATE_JOURNAL_STATUS
                        parameters:
                          - VAR_COMPANY_ID
                          - VAR_USER_ID
                          - VAR_USER_ID
                          - CURRENT_ROW.CREC_ID
                          - 80
                          - VAR_GL_SYSTEM_PARAM.LCOMMIT_APRJRN
                          - 0
                    - conditions:
                        operator: equals
                        field: VAR_GL_SYSTEM_PARAM.IREVERSE_JRN_POST
                        value: true
                        true:
                          - run_stored_procedure:
                              name: RSP_GL_PROCESS_REVERSING_JRN
                              parameters:
                                - VAR_COMPANY_ID
                                - VAR_USER_ID
                                - CURRENT_ROW.CDEPT_CODE
                                - CURRENT_ROW.CREF_NO
                                - CURRENT_ROW.CREC_ID
                    - conditions:
                        operator: is_not_empty
                        field: ""
                        true:
                          - set_var:
                              name: VAR_ERROR_COUNT
                              value: "VAR_ERROR_COUNT + 1"
                    - conditions:
                        operator: equals
                        field: VAR_STEP
                        value: VAR_DATA_COUNT
                        true:
                          - break_loop
              - run_stored_procedure:
                  name: RSP_WRITEUPLOADPROCESSSTATUS
                  parameters:
                    - VAR_COMPANY_ID
                    - VAR_USER_ID
                    - VAR_KEY_GUID
                    - VAR_STEP
                    - "Finish Committing Reversing Journal!"
                    - conditions:
                        operator: greater_than
                        field: VAR_ERROR_COUNT
                        value: 0
                        true: 9
                        false: 1
              - end_batch_process
          - front:
              - conditions:
                  operator: is_not_empty
                  field: ""
                  true:
                    - display_error_message
                  false:
                    - display_message:
                        text: "Selected Journal(s) Committed Successfully!"
                        buttons: [OK]
                    - refresh_grid: popup_rapid_commit_journal_list_grid

