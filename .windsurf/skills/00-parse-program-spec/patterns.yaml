                text: VAR_JOURNAL_CURRENCY_OPTIONS.CCURRENCY_NAME
                value: VAR_JOURNAL_CURRENCY_OPTIONS.CCURRENCY_CODE
                field: VAR_JOURNAL_FORM.CCURRENCY_CODE
                defaults:
                  - VAR_GSM_COMPANY.CLOCAL_CURRENCY_CODE
                options:
                  - run_stored_procedure:
                      name: RSP_GS_GET_CURRENCY_LIST
                      parameters:
                        - VAR_COMPANY_ID
                        - VAR_USER_ID
                      save_to: VAR_JOURNAL_CURRENCY_OPTIONS
                events:
                  on_value_changed:
                    - run_process: REFRESH_CURRENCY_RATE_PROCESS
              - element_id: journal_entry_base_rate_label
