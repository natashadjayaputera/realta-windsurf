      - element_id: journal_entry_journal_detail_groupbox
        type: groupbox
        text: "Journal Detail"
        contains:
          - element_id: journal_entry_journal_detail_grid
            type: grid
            field: VAR_JOURNAL_DETAIL_LIST
            mode: [VIEW, ADD, EDIT, DELETE]
            active_mode: VAR_GRID_SAVE_MODE
            validations:
              - conditions:
                  operator: not_equals
                  field: VAR_FORM_SAVE_MODE
                  value: "VIEW"
                  true: enabled
                  false: disabled
            events:
              on_add:
                - run_process: ADD_JOURNAL_DETAIL_PROCESS
              on_edit:
                - run_process: EDIT_JOURNAL_DETAIL_PROCESS
              on_delete:
                - run_process: DELETE_JOURNAL_DETAIL_PROCESS
              on_save:
                - run_process: SAVE_JOURNAL_DETAIL_PROCESS
            columns:
              - column: CREC_ID
                header: Journal Detail ID
                type: Textbox
                validations: Hidden
              - column: CBSIS
                header: Account Type
                type: Textbox
                validations: Hidden
              - column: CINPUT_TYPE
                header: Input Type
                type: Textbox
                validations: Hidden
              - column: INO
                header: No.
                type: Numeric Textbox
                validations: Disabled
              - column: CGLACCOUNT_NO
                header: Account No.
                type: Lookup Textbox
                validations:
                  - max_length: 20
                  - upper_case: true
                  - conditions:
                      operator: equals
                      field: VAR_GRID_SAVE_MODE
                      value: "EDIT"
                      true: enabled
                      false: disabled
                events:
                  on_lost_focus:
                    - search_lookup:
                        program: GSL00500
                        project: LOOKUP_GS
                        parameters:
                          - VAR_COMPANY_ID
                          - ""
                          - "GLM00100"
                          - ""
                          - ""
                          - 0
                          - 0
                          - VAR_USER_ID
                          - ""
                          - VAR_LANGUAGE_ID
                          - "SearchText: current row VAR_JOURNAL_DETAIL_LIST.CGLACCOUNT_NO"
                        save_to: VAR_RESULT
                    - conditions:
                        operator: is_not_empty
                        field: VAR_RESULT
                        true:
                          - set_var:
                              name: "current row VAR_JOURNAL_DETAIL_LIST.CGLACCOUNT_NO"
                              value: "VAR_RESULT.CGLACCOUNT_NO"
                          - set_var:
                              name: "current row VAR_JOURNAL_DETAIL_LIST.CGLACCOUNT_NAME"
                              value: "VAR_RESULT.CGLACCOUNT_NAME"
                          - set_var:
                              name: "current row VAR_JOURNAL_DETAIL_LIST.CBSIS"
                              value: "VAR_RESULT.CBSIS"
                          - conditions:
                              operator: and
                              conditions:
                                  operator: equals
                                  field: "VAR_RESULT.CBSIS"
                                  value: "B"
                                  operator: equals
                                  field: VAR_GSM_COMPANY.LENABLE_CENTER_IS
                                  value: true
                              true:
                                - set_var:
                                    name: "current row VAR_JOURNAL_DETAIL_LIST.CCENTER_CODE"
                                    value: ""
                                - set_var:
                                    name: "current row VAR_JOURNAL_DETAIL_LIST.CCENTER_NAME"
                                    value: ""
                        false:
                          - display_message:
                              text: "GL Account {0} not found!"
                              buttons: [OK]
                              args: ["current row VAR_JOURNAL_DETAIL_LIST.CGLACCOUNT_NO"]
                          - set_focus: this column
              - column: CGLACCOUNT_NAME
                header: Account Name
                type: Textbox
                validations: Disabled
              - column: CCENTER_CODE
                header: Center
                type: Combobox
                text: VAR_JOURNAL_STATUS_OPTIONS.CCENTER_NAME
                value: VAR_JOURNAL_STATUS_OPTIONS.CCENTER_CODE
                options:
                  - run_stored_procedure:
                      name: RSP_GS_GET_CENTER_LIST
                      parameters:
                        - VAR_COMPANY_ID
                        - VAR_USER_ID
                      save_to: VAR_JOURNAL_STATUS_OPTIONS
                validations:
                  - conditions:
                      operator: and
                      conditions:
                          operator: equals
                          field: VAR_GRID_SAVE_MODE
                          value: "EDIT"
                          operator: or
                          conditions:
                              operator: equals
                              field: VAR_GSM_COMPANY.LENABLE_CENTER_BS
                              value: true
                              operator: and
                              conditions:
                                  operator: equals
                                  field: "current row VAR_JOURNAL_DETAIL_LIST.CBSIS"
                                  value: "I"
                                  operator: equals
                                  field: VAR_GSM_COMPANY.LENABLE_CENTER_IS
                                  value: true
                      true: enabled
                      false: disabled
              - column: CDBCR
                header: D/C
                type: Textbox
                validations: Disabled
                value:
                  conditions:
                      operator: and
                      conditions:
                          operator: greater_than
                          field: "current row VAR_JOURNAL_DETAIL_LIST.NDEBIT"
                          value: 0
                          operator: equals
                          field: "current row VAR_JOURNAL_DETAIL_LIST.NCREDIT"
                          value: 0
                      true: "D"
                      false:
                        operator: and
                        conditions:
                            operator: equals
                            field: "current row VAR_JOURNAL_DETAIL_LIST.NDEBIT"
                            value: 0
                            operator: greater_than
                            field: "current row VAR_JOURNAL_DETAIL_LIST.NCREDIT"
                            value: 0
                        true: "C"
                        false: ""
              - column: NDEBIT
                header: Debit
                type: Numeric Textbox
                validations:
                  - conditions:
                      operator: not_equals
                      field: VAR_GRID_SAVE_MODE
                      value: "VIEW"
                      true: enabled
                      false: disabled
                  - decimal_places: 2
              - column: NCREDIT
                header: Credit
                type: Numeric Textbox
                validations:
                  - conditions:
                      operator: not_equals
                      field: VAR_GRID_SAVE_MODE
                      value: "VIEW"
                      true: enabled
                      false: disabled
                  - decimal_places: 2
              - column: CDETAIL_DESC
                header: Description
                type: Textbox
                validations:
                  - conditions:
                      operator: not_equals
                      field: VAR_GRID_SAVE_MODE
                      value: "VIEW"
                      true: enabled
                      false: disabled
              - column: CDOCUMENT_NO
                header: Voucher No.
                type: Textbox
                validations:
                  - max_length: 30
                  - conditions:
                      operator: not_equals
                      field: VAR_GRID_SAVE_MODE
                      value: "VIEW"
                      true: enabled
                      false: disabled
              - column: CDOCUMENT_DATE
                header: Voucher Date
                type: DateTime
                validations:
                  - conditions:
                      operator: not_equals
                      field: VAR_GRID_SAVE_MODE
                      value: "VIEW"
                      true: enabled
                      false: disabled
              - column: NLDEBIT
                header: DB (Local)
                type: Numeric Textbox
                validations: Disabled
              - column: NLCREDIT
                header: CR (Local)
                type: Numeric Textbox
                validations: Disabled
              - column: NBDEBIT
                header: DB (Base)
                type: Numeric Textbox
                validations: Disabled
              - column: NBCREDIT
                header: CR (Base)
                type: Numeric Textbox
                validations: Disabled

      - element_id: journal_entry_add_button
        type: button
        text: "Add"
        validations:
          - conditions:
              operator: equals
              field: VAR_FORM_SAVE_MODE
              value: "VIEW"
              true: enabled
              false: disabled
        events:
          on_click:
            - run_process: ADD_JOURNAL_PROCESS

      - element_id: journal_entry_copy_button
        type: button
        text: "Copy"
        validations:
          - conditions:
              operator: and
              conditions:
                  operator: equals
                  field: VAR_FORM_SAVE_MODE
                  value: "VIEW"
                  operator: is_not_empty
                  field: VAR_JOURNAL_FORM
              true: enabled
              false: disabled
        events:
          on_click:
            - run_process: COPY_JOURNAL_PROCESS

      - element_id: journal_entry_modify_button
        type: button
        text: "Modify"
        validations:
          - conditions:
              operator: and
              conditions:
                  operator: equals
                  field: VAR_FORM_SAVE_MODE
                  value: "VIEW"
                  operator: equals
                  field: VAR_JOURNAL_FORM.CSTATUS
                  value: "00"
              true: enabled
              false: disabled
        events:
          on_click:
            - run_process: EDIT_JOURNAL_PROCESS

      - element_id: journal_entry_delete_button
        type: button
        text: "Delete"
        validations:
          - conditions:
              operator: and
              conditions:
                  operator: equals
                  field: VAR_FORM_SAVE_MODE
                  value: "VIEW"
                  operator: equals
                  field: VAR_JOURNAL_FORM.CSTATUS
                  value: "00"
              true: enabled
              false: disabled
        events:
          on_click:
            - run_process: DELETE_JOURNAL_PROCESS

      - element_id: journal_entry_cancel_button
        type: button
        text: "Cancel"
        validations:
          - conditions:
              operator: not_equals
              field: VAR_FORM_SAVE_MODE
              value: "VIEW"
              true: enabled
              false: disabled
        events:
          on_click:
            - run_process: CANCEL_JOURNAL_PROCESS

      - element_id: journal_entry_save_button
        type: button
        text: "Save"
        validations:
          - conditions:
              operator: not_equals
              field: VAR_FORM_SAVE_MODE
              value: "VIEW"
              true: enabled
              false: disabled
        events:
          on_click:
            - run_process: SAVE_JOURNAL_PROCESS

      - element_id: journal_entry_print_button
        type: button
        text: "Print"
        validations:
          - conditions:
              operator: and
              conditions:
                  operator: equals
                  field: VAR_FORM_SAVE_MODE
                  value: "VIEW"
                  operator: is_not_empty
                  field: VAR_JOURNAL_FORM
              true: enabled
              false: disabled
        events:
          on_click:
            - call_program:
                program: GLTR00100
                parameters:
                  - P_JOURNAL_ID: VAR_JOURNAL_ID

      - element_id: journal_entry_submit_button
        type: button
        text:
          conditions:
            operator: equals
            field: VAR_JOURNAL_FORM.CSTATUS
            value: "10"
            true: "Undo Submit"
            false: "Submit"
        validations:
          - conditions:
              operator: and
              conditions:
                  operator: equals
                  field: VAR_FORM_SAVE_MODE
                  value: "VIEW"
                  operator: or
                  conditions:
                      operator: equals
                      field: VAR_JOURNAL_FORM.CSTATUS
                      value: "00"
                      operator: equals
                      field: VAR_JOURNAL_FORM.CSTATUS
                      value: "10"
              true: enabled
              false: disabled
        events:
          on_click:
            - run_process: SUBMIT_JOURNAL_PROCESS

      - element_id: journal_entry_approve_button
        type: button
        text: "Approve"
        validations:
          - conditions:
              operator: and
              conditions:
                  operator: equals
                  field: VAR_JOURNAL_FORM.CSTATUS
                  value: "00"
                  operator: equals
                  field: VAR_GSM_TRANSACTION_CODE.LAPPROVAL_FLAG
                  value: true
              true: enabled
              false: disabled
        events:
          on_click:
            - run_process: APPROVE_JOURNAL_PROCESS

      - element_id: journal_entry_commit_button
        type: button
        text:
          conditions:
            operator: equals
            field: VAR_JOURNAL_FORM.CSTATUS
            value: "80"
            true: "Undo Commit"
            false: "Commit"
        validations:
          - conditions:
              operator: and
              conditions:
                  operator: or
                  conditions:
                      operator: equals
                      field: VAR_JOURNAL_FORM.CSTATUS
                      value: "20"
                      operator: and
                      conditions:
                          operator: equals
                          field: VAR_JOURNAL_FORM.CSTATUS
                          value: "80"
                          operator: not_equals
                          field: VAR_IUNDO_COMMIT_JRN
                          value: 1
                  operator: greater_or_equal
                  field: VAR_JOURNAL_FORM.CJOURNAL_PERIOD
                  value: VAR_GL_SYSTEM_PARAM.CSOFT_PERIOD
              true: enabled
              false: disabled
        events:
          on_click:
            - run_process: COMMIT_JOURNAL_PROCESS

    processes:
      - process_id: INITIAL_PROCESS
        category: initialization
        validations: []
        action:
          - front:
              - set_var:
                  name: VAR_JOURNAL_FORM
                  value: empty object
              - set_var:
                  name: VAR_JOURNAL_DETAIL_LIST
                  value: empty list
              - set_var:
                  name: VAR_FORM_SAVE_MODE
                  value: "VIEW"
              - set_var:
                  name: VAR_GRID_SAVE_MODE
                  value: "VIEW"
              - set_var:
                  name: VAR_JOURNAL_ID
                  value: "selected VAR_JOURNAL_LIST.CREC_ID from JOURNAL_LIST"
              - set_var:
                  name: VAR_COMPANY_ID
                  value: "VAR_COMPANY_ID from JOURNAL_LIST"
              - set_var:
                  name: VAR_USER_ID
                  value: "VAR_USER_ID from JOURNAL_LIST"
              - set_var:
                  name: VAR_LANGUAGE_ID
                  value: "VAR_LANGUAGE_ID from JOURNAL_LIST"
              - set_var:
                  name: VAR_GSM_COMPANY
                  value: "VAR_GSM_COMPANY from JOURNAL_LIST"
              - run_process: REFRESH_FORM_PROCESS

      - process_id: REFRESH_FORM_PROCESS
        category: business-object-overridden-function
        validations: []
        action:
          - back:
              - start_display_process
              - run_stored_procedure:
                  name: RSP_GL_GET_JOURNAL
                  parameters:
                    - VAR_COMPANY_ID
                    - VAR_USER_ID
                    - VAR_JOURNAL_ID
                    - VAR_LANGUAGE_ID
                  save_to: VAR_JOURNAL_FORM
              - run_stored_procedure:
                  name: RSP_GL_GET_JOURNAL_DETAIL_LIST
                  parameters:
                    - VAR_JOURNAL_FORM.CREC_ID
                    - VAR_LANGUAGE_ID
                  save_to: VAR_JOURNAL_DETAIL_LIST
              - end_display_process

      - process_id: REFRESH_CURRENCY_RATE_PROCESS
        category: other-function
        validations: []
        action:
          - back:
              - run_stored_procedure:
                  name: RSP_GS_GET_LAST_CURRENCY_RATE
                  parameters:
                    - VAR_COMPANY_ID
                    - VAR_JOURNAL_FORM.CCURRENCY_CODE
                    - VAR_GL_SYSTEM_PARAM.CRATETYPE_CODE
                    - "VAR_JOURNAL_FORM.CREF_DATE (YYYYMMDD)"
                  save_to: VAR_RESULT
          - front:
              - conditions:
                  operator: is_not_empty
                  field: VAR_RESULT
                  true:
                    - set_var:
                        name: VAR_JOURNAL_FORM.NLBASE_RATE
                        value: "VAR_RESULT.NLBASE_RATE"
                    - set_var:
                        name: VAR_JOURNAL_FORM.NLCURRENCY_RATE
                        value: "VAR_RESULT.NLCURRENCY_RATE"
                    - set_var:
                        name: VAR_JOURNAL_FORM.NBBASE_RATE
                        value: "VAR_RESULT.NBBASE_RATE"
                    - set_var:
                        name: VAR_JOURNAL_FORM.NBCURRENCY_RATE
                        value: "VAR_RESULT.NBCURRENCY_RATE"
                  false:
                    - set_var:
                        name: VAR_JOURNAL_FORM.NLBASE_RATE
                        value: 1
                    - set_var:
                        name: VAR_JOURNAL_FORM.NLCURRENCY_RATE
                        value: 1
                    - set_var:
                        name: VAR_JOURNAL_FORM.NBBASE_RATE
                        value: 1
                    - set_var:
                        name: VAR_JOURNAL_FORM.NBCURRENCY_RATE
                        value: 1

      - process_id: ADD_JOURNAL_PROCESS
        category: other-function
        validations: []
        action:
          - front:
              - set_var:
                  name: VAR_FORM_SAVE_MODE
                  value: "ADD"
              - set_disabled: JOURNAL_LIST
              - set_var:
                  name: VAR_JOURNAL_FORM
                  value: empty object
              - set_var:
                  name: VAR_JOURNAL_DETAIL_LIST
                  value: empty list
              - set_focus: journal_entry_department_code_textbox

      - process_id: EDIT_JOURNAL_PROCESS
        category: other-function
        validations: []
        action:
          - front:
              - set_var:
                  name: VAR_FORM_SAVE_MODE
                  value: "EDIT"
              - set_disabled: JOURNAL_LIST
              - set_focus: journal_entry_department_code_textbox

      - process_id: DELETE_JOURNAL_PROCESS
        category: business-object-overridden-function
        validations: []
        action:
          - front:
              - display_message:
                  text: "Are you sure you want to delete this journal?"
                  buttons: [Yes/No]
                  on_no: end_process
          - back:
              - start_delete_process
              - run_stored_procedure:
                  name: RSP_GL_UPDATE_JOURNAL_STATUS
                  parameters:
                    - VAR_COMPANY_ID
                    - VAR_USER_ID
                    - VAR_USER_ID
                    - VAR_JOURNAL_FORM.CREC_ID
                    - 99
                    - 0
                    - 0
              - end_delete_process
          - front:
              - conditions:
                  operator: is_not_empty
                  field: ""
                  true:
                    - display_error_message
                  false:
                    - display_message:
                        text: "Journal Deleted Successfully"
                        buttons: [OK]

      - process_id: COPY_JOURNAL_PROCESS
        category: other-function
        validations: []
        action:
          - front:
              - set_var:
                  name: VAR_FORM_SAVE_MODE
                  value: "ADD"
              - set_disabled: JOURNAL_LIST
              - set_var:
                  name: VAR_JOURNAL_FORM.CREF_NO
                  value: ""
              - set_focus: journal_entry_department_code_textbox

      - process_id: SUBMIT_JOURNAL_PROCESS
        category: other-function
        validations:
          - field: VAR_JOURNAL_FORM.CSTATUS
            conditions:
              operator: and
              conditions:
                  operator: equals
                  field: VAR_JOURNAL_FORM.CSTATUS
                  value: "00"
                  operator: less_than
                  field: VAR_JOURNAL_FORM.CREF_PRD
                  value: VAR_GL_SYSTEM_PARAM.CSOFT_PERIOD
            message: "Cannot Submit Journal with date before Soft Close Period!"
        action:
          - front:
              - conditions:
                  operator: equals
                  field: VAR_JOURNAL_FORM.CSTATUS
                  value: "10"
                  true:
                    - display_message:
                        text: "Are you sure you want to undo submit this journal?"
                        buttons: [Yes/No]
                        on_no: end_process
                  false:
                    - display_message:
                        text: "Are you sure you want to submit this journal?"
                        buttons: [Yes/No]
                        on_no: end_process
              - conditions:
                  operator: equals
                  field: VAR_JOURNAL_FORM.CSTATUS
                  value: "00"
                  true:
                    - set_var:
                        name: VAR_NEW_STATUS
                        value: "10"
                  false:
                    - set_var:
                        name: VAR_NEW_STATUS
                        value: "00"
          - back:
              - run_stored_procedure:
                  name: RSP_GL_UPDATE_JOURNAL_STATUS
                  parameters:
                    - VAR_COMPANY_ID
                    - VAR_USER_ID
                    - VAR_USER_ID
                    - VAR_JOURNAL_FORM.CREC_ID
                    - VAR_NEW_STATUS
                    - 0
                    - 0
          - front:
              - conditions:
                  operator: is_not_empty
                  field: ""
                  true:
                    - display_error_message
                  false:
                    - run_process: REFRESH_FORM_PROCESS

      - process_id: APPROVE_JOURNAL_PROCESS
        category: other-function
        validations: []
        action:
          - front:
              - conditions:
                  operator: equals
                  field: VAR_JOURNAL_FORM.LALLOW_APPROVE
                  value: false
                  true:
                    - display_message:
                        text: "You don't have right to approve this journal!"
                        buttons: [OK]
                    - end_process
              - display_message:
                  text: "Are you sure you want to approve this journal?"
                  buttons: [Yes/No]
                  on_no: end_process
          - back:
              - run_stored_procedure:
                  name: RSP_GL_UPDATE_JOURNAL_STATUS
                  parameters:
                    - VAR_COMPANY_ID
                    - VAR_USER_ID
                    - VAR_USER_ID
                    - VAR_JOURNAL_FORM.CREC_ID
                    - 20
                    - VAR_GL_SYSTEM_PARAM.LCOMMIT_APRJRN
                    - 0
          - front:
              - conditions:
                  operator: is_not_empty
                  field: ""
                  true:
                    - display_error_message
                  false:
                    - display_message:
                        text: "Journal Approved Successfully"
                        buttons: [OK]

      - process_id: COMMIT_JOURNAL_PROCESS
        category: other-function
        validations:
          - field: VAR_GSM_TRANSACTION_CODE.LINCREMENT_FLAG
            conditions:
              operator: equals
              field: VAR_GSM_TRANSACTION_CODE.LINCREMENT_FLAG
              value: false
            message: "Cannot commit Reverse Journal with Manual numbering! Transaction numbering setting for Reversing Journal should be auto increment, not manual numbering!"
        action:
          - front:
              - conditions:
                  operator: equals
                  field: VAR_JOURNAL_FORM.CSTATUS
                  value: "80"
                  true:
                    - display_message:
                        text: "Are you sure you want to undo commit this journal?"
                        buttons: [Yes/No]
                        on_no: end_process
                  false:
                    - display_message:
                        text: "Are you sure you want to commit this journal?"
                        buttons: [Yes/No]
                        on_no: end_process
          - back:
              - conditions:
                  operator: equals
                  field: VAR_JOURNAL_FORM.CSTATUS
                  value: "80"
                  true:
                    - run_stored_procedure:
                        name: RSP_GL_UNDO_REVERSING_JRN
                        parameters:
                          - VAR_COMPANY_ID
                          - VAR_USER_ID
                          - VAR_JOURNAL_FORM.CREC_ID
                  false:
                    - conditions:
                        operator: equals
                        field: VAR_GL_SYSTEM_PARAM.IREVERSE_JRN_POST
                        value: true
                        true:
                          - run_stored_procedure:
                              name: RSP_GL_PROCESS_REVERSING_JRN
                              parameters:
                                - VAR_COMPANY_ID
                                - VAR_USER_ID
                                - VAR_JOURNAL_FORM.CDEPT_CODE
                                - VAR_JOURNAL_FORM.CREF_NO
                                - VAR_JOURNAL_FORM.CREC_ID
              - conditions:
                  operator: equals
                  field: VAR_JOURNAL_FORM.CSTATUS
                  value: "80"
                  true:
                    - conditions:
                        operator: equals
                        field: VAR_GSM_TRANSACTION_CODE.LAPPROVAL_FLAG
                        value: true
                        true:
                          - set_var:
                              name: VAR_NEW_STATUS
                              value: "10"
                        false:
                          - set_var:
                              name: VAR_NEW_STATUS
                              value: "00"
                  false:
                    - set_var:
                        name: VAR_NEW_STATUS
                        value: "80"
              - run_stored_procedure:
                  name: RSP_GL_UPDATE_JOURNAL_STATUS
                  parameters:
                    - VAR_COMPANY_ID
                    - VAR_USER_ID
                    - VAR_USER_ID
                    - VAR_JOURNAL_FORM.CREC_ID
                    - VAR_NEW_STATUS
                    - 0
                    - conditions:
                        operator: equals
                        field: VAR_JOURNAL_FORM.CSTATUS
                        value: "80"
                        true: 1
                        false: 0
          - front:
              - conditions:
                  operator: is_not_empty
                  field: ""
                  true:
                    - display_error_message
                  false:
                    - conditions:
                        operator: equals
                        field: VAR_JOURNAL_FORM.CSTATUS
                        value: "80"
                        true:
                          - display_message:
                              text: "Journal Undo Committed Successfully"
                              buttons: [OK]
                        false:
                          - display_message:
                              text: "Journal Committed Successfully"
                              buttons: [OK]

      - process_id: SAVE_JOURNAL_PROCESS
        category: business-object-overridden-function
        validations:
          - field: VAR_JOURNAL_FORM.CDEPT_CODE
            conditions:
              operator: is_empty
              field: VAR_JOURNAL_FORM.CDEPT_CODE
            message: "Please select Department!"
          - field: VAR_JOURNAL_FORM.CREF_NO
            conditions:
              operator: and
              conditions:
                  operator: is_empty
                  field: VAR_JOURNAL_FORM.CREF_NO
                  operator: equals
                  field: VAR_GSM_TRANSACTION_CODE.LINCREMENT_FLAG
                  value: false
            message: "Reference No. is required!"
          - field: VAR_JOURNAL_FORM.CREF_DATE
            conditions:
              operator: less_than
              field: VAR_JOURNAL_FORM.CREF_DATE
              value: VAR_CCURRENT_PERIOD_START_DATE
            message: "Reference Date may not be earlier than Current Period!"
          - field: VAR_JOURNAL_FORM.CREF_DATE
            conditions:
              operator: greater_than
              field: VAR_JOURNAL_FORM.CREF_DATE
              value: VAR_JOURNAL_FORM.CREVERSE_DATE
            message: "Reference Date may not be later than Reversing Date!"
          - field: VAR_JOURNAL_FORM.CREF_DATE
            conditions:
              operator: greater_than
              field: VAR_JOURNAL_FORM.CREF_DATE
              value: VAR_TODAY
            message: "Reference Date may not be later than Today!"
          - field: VAR_JOURNAL_FORM.CDOC_NO
            conditions:
              operator: is_empty
              field: VAR_JOURNAL_FORM.CDOC_NO
            message: "Document No. is required!"
          - field: VAR_JOURNAL_FORM.CDOC_DATE
            conditions:
              operator: is_empty
              field: VAR_JOURNAL_FORM.CDOC_DATE
            message: "Document Date is required!"
          - field: VAR_JOURNAL_FORM.CDOC_DATE
            conditions:
              operator: and
              conditions:
                  operator: is_not_empty
                  field: VAR_JOURNAL_FORM.CDOC_DATE
                  operator: is_not_empty
                  field: VAR_JOURNAL_FORM.CREVERSE_DATE
                  operator: greater_than
                  field: VAR_JOURNAL_FORM.CDOC_DATE
                  value: VAR_JOURNAL_FORM.CREVERSE_DATE
            message: "Document Date cannot be after Reversing Date!"
          - field: VAR_JOURNAL_FORM.CDOC_DATE
            conditions:
              operator: and
              conditions:
                  operator: is_not_empty
                  field: VAR_JOURNAL_FORM.CDOC_DATE
                  operator: less_than
                  field: VAR_JOURNAL_FORM.CDOC_DATE
                  value: VAR_CCURRENT_PERIOD_START_DATE
            message: "Document Date cannot be before Current Period!"
          - field: VAR_JOURNAL_FORM.CREVERSE_DATE
            conditions:
              operator: is_empty
              field: VAR_JOURNAL_FORM.CREVERSE_DATE
            message: "Reversing Date is required!"
          - field: VAR_JOURNAL_FORM.CREVERSE_DATE
            conditions:
              operator: less_than
              field: VAR_JOURNAL_FORM.CREVERSE_DATE
              value: VAR_JOURNAL_FORM.CREF_DATE
            message: "Reversing Date may not be earlier than Ref. Date!"
          - field: VAR_JOURNAL_FORM.CTRANS_DESC
            conditions:
              operator: is_empty
              field: VAR_JOURNAL_FORM.CTRANS_DESC
            message: "Description is required!"
          - field: VAR_JOURNAL_DETAIL_LIST
            conditions:
              operator: is_empty
              field: VAR_JOURNAL_DETAIL_LIST
            message: "Please input Journal Detail!"
          - field: VAR_JOURNAL_FORM.NTRANS_AMOUNT
            conditions:
              operator: and
              conditions:
                  operator: or
                  conditions:
                      operator: greater_than
                      field: VAR_JOURNAL_FORM.NDEBIT_AMOUNT
                      value: 0
                      operator: greater_than
                      field: VAR_JOURNAL_FORM.NCREDIT_AMOUNT
                      value: 0
                  operator: not_equals
                  field: VAR_JOURNAL_FORM.NDEBIT_AMOUNT
                  value: VAR_JOURNAL_FORM.NCREDIT_AMOUNT
            message: "Total Debit Amount must be equal to Total Credit Amount!"
          - field: VAR_JOURNAL_FORM.NPRELIST_AMOUNT
            conditions:
              operator: and
              conditions:
                  operator: greater_than
                  field: VAR_JOURNAL_FORM.NPRELIST_AMOUNT
                  value: 0
                  operator: not_equals
                  field: VAR_JOURNAL_FORM.NPRELIST_AMOUNT
                  value: VAR_JOURNAL_FORM.NTRANS_AMOUNT
            message: "Journal Amount is not equal to Prelist!"
          - field: VAR_JOURNAL_FORM.NLBASE_RATE
            conditions:
              operator: less_or_equal
              field: VAR_JOURNAL_FORM.NLBASE_RATE
              value: 0
            message: "Local Currency Base Rate must be greater than 0!"
          - field: VAR_JOURNAL_FORM.NLCURRENCY_RATE
            conditions:
              operator: less_or_equal
              field: VAR_JOURNAL_FORM.NLCURRENCY_RATE
              value: 0
            message: "Local Currency Rate must be greater than 0!"
          - field: VAR_JOURNAL_FORM.NBBASE_RATE
            conditions:
              operator: less_or_equal
              field: VAR_JOURNAL_FORM.NBBASE_RATE
              value: 0
            message: "Base Currency Base Rate must be greater than 0!"
          - field: VAR_JOURNAL_FORM.NBCURRENCY_RATE
            conditions:
              operator: less_or_equal
              field: VAR_JOURNAL_FORM.NBCURRENCY_RATE
              value: 0
            message: "Base Currency  Rate must be greater than 0!"
        action:
          - back:
              - start_update_process
              - create_temporary_table:
                  name: "#GLT0100_JOURNAL_DETAIL"
                  columns:
                    - name: CGLACCOUNT_NO
                      type: VARCHAR(20)
                    - name: CCENTER_CODE
                      type: VARCHAR(10)
                    - name: CDBCR
                      type: CHAR(1)
                    - name: NAMOUNT
                      type: NUMERIC(19,2)
                    - name: CDETAIL_DESC
                      type: NVARCHAR(200)
                    - name: CDOCUMENT_NO
                      type: VARCHAR(20)
                    - name: CDOCUMENT_DATE
                      type: VARCHAR(8)
                    - name: CINPUT_TYPE
                      type: CHAR(1)
                      default: "'M'"
              - bulk_insert:
                  from: VAR_JOURNAL_DETAIL_LIST
                  to: "#GLT0100_JOURNAL_DETAIL"
              - run_stored_procedure:
                  name: RSP_GL_SAVE_JOURNAL
                  parameters:
                    - VAR_USER_ID
                    - conditions:
                        operator: equals
                        field: VAR_FORM_SAVE_MODE
                        value: "ADD"
                        true: ""
                        false: "VAR_JOURNAL_FORM.CREC_ID"
                    - conditions:
                        operator: equals
                        field: VAR_FORM_SAVE_MODE
                        value: "ADD"
                        true: "NEW"
                        false: "VAR_FORM_SAVE_MODE"
                    - VAR_COMPANY_ID
                    - VAR_JOURNAL_FORM.CDEPT_CODE
                    - VAR_TRANS_CODE
                    - conditions:
                        operator: equals
                        field: VAR_GSM_TRANSACTION_CODE.LINCREMENT_FLAG
                        value: false
                        true: "VAR_JOURNAL_FORM.CREF_NO"
                        false: ""
                    - VAR_JOURNAL_FORM.CDOC_NO
                    - "VAR_JOURNAL_FORM.CDOC_DATE (YYYYMMDD)"
                    - "VAR_JOURNAL_FORM.CREF_DATE (YYYYMMDD)"
                    - "VAR_JOURNAL_FORM.CREVERSE_DATE (YYYYMMDD)"
                    - 0
                    - VAR_JOURNAL_FORM.CTRANS_DESC
                    - VAR_JOURNAL_FORM.CCURRENCY_CODE
                    - VAR_JOURNAL_FORM.NLBASE_RATE
                    - VAR_JOURNAL_FORM.NLCURRENCY_RATE
                    - VAR_JOURNAL_FORM.NBBASE_RATE
                    - VAR_JOURNAL_FORM.NBCURRENCY_RATE
                    - VAR_JOURNAL_FORM.NPRELIST_AMOUNT
                  save_to: VAR_RESULT
              - end_update_process
          - front:
              - conditions:
                  operator: is_not_empty
                  field: ""
                  true:
                    - display_error_message
                  false:
                    - set_var:
                        name: VAR_JOURNAL_ID
                        value: "VAR_RESULT.CJRN_ID"
              - set_var:
                  name: VAR_FORM_SAVE_MODE
                  value: "VIEW"
              - set_enabled: JOURNAL_LIST
              - run_process: REFRESH_FORM_PROCESS

      - process_id: CANCEL_JOURNAL_PROCESS
        category: other-function
        validations: []
        action:
          - front:
              - display_message:
                  text: "You haven't saved your changes. Are you sure want to cancel?"
                  buttons: [Yes/No]
                  on_no: end_process
              - set_var:
                  name: VAR_FORM_SAVE_MODE
                  value: "VIEW"
              - set_enabled: JOURNAL_LIST
              - run_process: REFRESH_FORM_PROCESS

      - process_id: ADD_JOURNAL_DETAIL_PROCESS
        category: other-function
        validations:
          - field: VAR_JOURNAL_FORM.CDOC_NO
            conditions:
              operator: is_empty
              field: VAR_JOURNAL_FORM.CDOC_NO
            message: "Document No. is required!"
          - field: VAR_JOURNAL_FORM.CDOC_DATE
            conditions:
              operator: is_empty
              field: VAR_JOURNAL_FORM.CDOC_DATE
            message: "Document Date is required!"
          - field: VAR_JOURNAL_FORM.CDOC_DATE
            conditions:
              operator: and
              conditions:
                  operator: is_not_empty
                  field: VAR_JOURNAL_FORM.CDOC_DATE
                  operator: is_not_empty
                  field: VAR_JOURNAL_FORM.CREVERSE_DATE
                  operator: greater_than
                  field: VAR_JOURNAL_FORM.CDOC_DATE
                  value: VAR_JOURNAL_FORM.CREVERSE_DATE
            message: "Document Date cannot be after Reversing Date!"
          - field: VAR_JOURNAL_FORM.CDOC_DATE
            conditions:
              operator: and
              conditions:
                  operator: is_not_empty
                  field: VAR_JOURNAL_FORM.CDOC_DATE
                  operator: less_than
                  field: VAR_JOURNAL_FORM.CDOC_DATE
                  value: VAR_CCURRENT_PERIOD_START_DATE
            message: "Document Date cannot be before Current Period!"
          - field: VAR_JOURNAL_FORM.CTRANS_DESC
            conditions:
              operator: is_empty
              field: VAR_JOURNAL_FORM.CTRANS_DESC
            message: "Description is required!"
        action:
          - front:
              - set_var:
                  name: VAR_GRID_SAVE_MODE
                  value: "ADD"
              - add_row:
                  to: VAR_JOURNAL_DETAIL_LIST
                  as: current_row
              - set_var:
                  name: "current row VAR_JOURNAL_DETAIL_LIST.NO"
                  value: "VAR_JOURNAL_DETAIL_LIST.Count + 1"
              - set_var:
                  name: "current row VAR_JOURNAL_DETAIL_LIST.CDETAIL_DESC"
                  value: "VAR_JOURNAL_FORM.CTRANS_DESC"
              - set_var:
                  name: "current row VAR_JOURNAL_DETAIL_LIST.CDOC_NO"
                  value: "VAR_JOURNAL_FORM.CDOC_NO"
              - set_var:
                  name: "current row VAR_JOURNAL_DETAIL_LIST.CDOC_DATE"
                  value: "VAR_JOURNAL_FORM.CDOC_DATE"
              - set_focus: "VAR_JOURNAL_DETAIL_LIST.CGLACCOUNT_NO"

      - process_id: EDIT_JOURNAL_DETAIL_PROCESS
        category: other-function
        validations:
          - field: VAR_JOURNAL_FORM.CDOC_NO
            conditions:
              operator: is_empty
              field: VAR_JOURNAL_FORM.CDOC_NO
            message: "Document No. is required!"
          - field: VAR_JOURNAL_FORM.CDOC_DATE
            conditions:
              operator: is_empty
              field: VAR_JOURNAL_FORM.CDOC_DATE
            message: "Document Date is required!"
          - field: VAR_JOURNAL_FORM.CDOC_DATE
            conditions:
              operator: and
              conditions:
                  operator: is_not_empty
                  field: VAR_JOURNAL_FORM.CDOC_DATE
                  operator: is_not_empty
                  field: VAR_JOURNAL_FORM.CREVERSE_DATE
                  operator: greater_than
                  field: VAR_JOURNAL_FORM.CDOC_DATE
                  value: VAR_JOURNAL_FORM.CREVERSE_DATE
            message: "Document Date cannot be after Reversing Date!"
          - field: VAR_JOURNAL_FORM.CDOC_DATE
            conditions:
              operator: and
              conditions:
                  operator: is_not_empty
                  field: VAR_JOURNAL_FORM.CDOC_DATE
                  operator: less_than
                  field: VAR_JOURNAL_FORM.CDOC_DATE
                  value: VAR_CCURRENT_PERIOD_START_DATE
            message: "Document Date cannot be before Current Period!"
          - field: VAR_JOURNAL_FORM.CTRANS_DESC
            conditions:
              operator: is_empty
              field: VAR_JOURNAL_FORM.CTRANS_DESC
            message: "Description is required!"
        action:
          - front:
              - set_var:
                  name: VAR_GRID_SAVE_MODE
                  value: "EDIT"
              - set_focus: "VAR_JOURNAL_DETAIL_LIST.CGLACCOUNT_NO"

      - process_id: DELETE_JOURNAL_DETAIL_PROCESS
        category: other-function
        validations: []
        action:
          - front:
              - display_message:
                  text: "Delete Selected Journal Detail?"
                  buttons: [Yes/No]
                  on_no: end_process
              - delete_row:
                  from: VAR_JOURNAL_DETAIL_LIST
                  selected: true
              - recalculate:
                  field: "VAR_JOURNAL_DETAIL_LIST.NO"
                  formula: "row index + 1"
              - run_process: REFRESH_JOURNAL_DETAIL_PROCESS

      - process_id: REFRESH_JOURNAL_DETAIL_PROCESS
        category: other-function
        validations: []
        action:
          - front:
              - set_var:
                  name: VAR_JOURNAL_FORM.NDEBIT_AMOUNT
                  value: "SUM of VAR_JOURNAL_DETAIL_LIST.NDEBIT"
              - set_var:
                  name: VAR_JOURNAL_FORM.NCREDIT_AMOUNT
                  value: "SUM of VAR_JOURNAL_DETAIL_LIST.NCREDIT"

      - process_id: SAVE_JOURNAL_DETAIL_PROCESS
        category: other-function
        validations:
          - field: "current row VAR_JOURNAL_DETAIL_LIST.CGLACCOUNT_NO"
            conditions:
              operator: is_empty
              field: "current row VAR_JOURNAL_DETAIL_LIST.CGLACCOUNT_NO"
            message: "Account No. is required!"
          - field: "current row VAR_JOURNAL_DETAIL_LIST.CGLACCOUNT_NO"
            conditions:
              operator: exists_in
              field: "current row VAR_JOURNAL_DETAIL_LIST.CGLACCOUNT_NO"
              in: VAR_JOURNAL_DETAIL_LIST
            message: "Account No. {0} already exists! [current row VAR_JOURNAL_DETAIL_LIST.CGLACCOUNT_NO]"
          - field: "current row VAR_JOURNAL_DETAIL_LIST.CCENTER_CODE"
            conditions:
              operator: and
              conditions:
                  operator: is_empty
                  field: "current row VAR_JOURNAL_DETAIL_LIST.CCENTER_CODE"
                  operator: or
                  conditions:
                      operator: equals
                      field: VAR_GSM_COMPANY.LENABLE_CENTER_BS
                      value: true
                      operator: and
                      conditions:
                          operator: equals
                          field: "current row VAR_JOURNAL_DETAIL_LIST.CBSIS"
                          value: "I"
                          operator: equals
                          field: VAR_GSM_COMPANY.LENABLE_CENTER_BS
                          value: true
            message: "Center Code is required for Account No. {0}! [current row VAR_JOURNAL_DETAIL_LIST.CGLACCOUNT_NO]"
          - field: "current row VAR_JOURNAL_DETAIL_LIST.NDEBIT"
            conditions:
              operator: and
              conditions:
                  operator: equals
                  field: "current row VAR_JOURNAL_DETAIL_LIST.NDEBIT"
                  value: 0
                  operator: equals
                  field: "current row VAR_JOURNAL_DETAIL_LIST.NCREDIT"
                  value: 0
            message: "Journal amount cannot be 0!"
          - field: "current row VAR_JOURNAL_DETAIL_LIST.NDEBIT"
            conditions:
              operator: and
              conditions:
                  operator: greater_than
                  field: "current row VAR_JOURNAL_DETAIL_LIST.NDEBIT"
                  value: 0
                  operator: greater_than
                  field: "current row VAR_JOURNAL_DETAIL_LIST.NCREDIT"
                  value: 0
            message: "Journal amount can only be either Debit or Credit!"
        action:
          - front:
              - set_var:
                  name: VAR_JOURNAL_FORM.CDBCR
                  value:
                    conditions:
                      operator: greater_than
                      field: "VAR_JOURNAL_DETAIL_LIST.NDEBIT"
                      value: 0
                      true: "D"
                      false: "C"
              - run_process: REFRESH_JOURNAL_DETAIL_PROCESS
