---
project: BIMASAKTI 11
module: GL
program_id: GLT00300
program_title: Reversing Journal
purpose: Program for Reversing Journal entry
updated_date: 2023-04-27
updated_by: SG
---

program_definition: Program for create, update, view, approve, and commit Reversing Journal

related_tables:
  - table_name: GLT_TRANS_HD
    access: RW
  - table_name: GLT_TRANS_JRN
    access: RW
  - table_name: GLA_ACCOUNT_BALANCE
    access: RW
  - table_name: GSM_COA
    access: R
  - table_name: GSM_CENTER
    access: R
  - table_name: GSM_COMPANY
    access: R
  - table_name: GSM_DEPARTMENT
    access: R
  - table_name: GSM_CURRENCY
    access: R
  - table_name: GSM_CURRENCY_RATE
    access: R
  - table_name: GLM_SYSTEM_PARAM
    access: R

roles:
  - Users who have access to the program

tabs:
  - tab_id: JOURNAL_LIST
    sub_program_id: GLT00300
    initialization:
      - run_process: INITIAL_PROCESS

    user_interface_elements:
      - element_id: journal_list_department_label
        type: label
        text: "Department"
      - element_id: journal_list_department_code_textbox
        type: textbox
        field: VAR_FILTER.CDEPT_CODE
        defaults:
          - "First value from VAR_USER_DEPARTMENT_LIST.CDEPT_CODE"
          - conditions:
              operator: contains
              field: VAR_USER_DEPARTMENT_LIST.CDEPT_CODE
              value: VAR_GL_SYSTEM_PARAM.CCLOSE_DEPT_CODE
              true: "VAR_GL_SYSTEM_PARAM.CCLOSE_DEPT_CODE"
              false: ""
        validations:
          - max_length: 20
          - upper_case: true
        events:
          on_lost_focus:
            - search_lookup:
                program: GSL00700
                project: LOOKUP_GS
                parameters:
                  - VAR_COMPANY_ID
                  - VAR_USER_ID
                  - "SearchText: VAR_FILTER.CDEPT_CODE"
                save_to: VAR_RESULT
            - conditions:
                operator: is_not_empty
                field: VAR_RESULT
                true:
                  - set_var:
                      name: VAR_FILTER.CDEPT_NAME
                      value: "VAR_RESULT.CDEPT_NAME"
                false:
                  - display_message:
                      text: "Department {0} not found!"
                      buttons: [OK]
                      args: ["VAR_FILTER.CDEPT_CODE"]
                  - set_focus: department_code_textbox
                  - set_var:
                      name: VAR_FILTER.CDEPT_CODE
                      value: ""
                  - set_var:
                      name: VAR_FILTER.CDEPT_NAME
                      value: ""
      - element_id: journal_list_department_code_lookup_button
        type: button
        text: "..."
        events:
          on_click:
            - open_lookup:
                program: GSL00700
                project: LOOKUP_GS
                parameters:
                  - VAR_COMPANY_ID
                  - VAR_USER_ID
                save_to: VAR_RESULT
            - conditions:
                operator: is_not_empty
                field: VAR_RESULT
                true:
                  - set_var:
                      name: VAR_FILTER.CDEPT_CODE
                      value: "VAR_RESULT.CDEPT_CODE"
                  - set_var:
                      name: VAR_FILTER.CDEPT_NAME
                      value: "VAR_RESULT.CDEPT_NAME"
                false:
                  - set_var:
                      name: VAR_FILTER.CDEPT_CODE
                      value: ""
                  - set_var:
                      name: VAR_FILTER.CDEPT_NAME
                      value: ""
      - element_id: journal_list_department_name_textbox
        type: textbox
        field: VAR_FILTER.CDEPT_NAME
        defaults:
          - "First value from VAR_USER_DEPARTMENT_LIST.CDEPT_NAME"
          - conditions:
              operator: contains
              field: VAR_USER_DEPARTMENT_LIST.CDEPT_CODE
              value: VAR_GL_SYSTEM_PARAM.CCLOSE_DEPT_CODE
              true: "VAR_GL_SYSTEM_PARAM.CCLOSE_DEPT_NAME"
              false: ""
        validations:
          - disabled: true
      - element_id: journal_list_journal_period_label
        type: label
        text: "Journal Period"
      - element_id: journal_list_journal_period_year_numeric_textbox
        type: numeric_textbox
        field: VAR_FILTER.CJOURNAL_PERIOD_YY
        defaults:
          - "VAR_GL_SYSTEM_PARAM.CSOFT_PERIOD_YY"
        validations:
          - min: "VAR_GSM_PERIOD.IMIN_YY"
          - max: "VAR_GSM_PERIOD.IMAX_YY"
          - step: 1
      - element_id: journal_list_journal_period_month_combobox
        type: combobox
        text: VAR_JOURNAL_PERIOD_MM_OPTIONS.CNAME
        value: VAR_JOURNAL_PERIOD_MM_OPTIONS.CCODE
        field: VAR_FILTER.CJOURNAL_PERIOD_MM
        defaults:
          - "VAR_GL_SYSTEM_PARAM.CSOFT_PERIOD_MM"
        options:
          create_var: VAR_JOURNAL_PERIOD_MM_OPTIONS
          data:
            - {CCODE: '01', CNAME: '01'}
            - {CCODE: '02', CNAME: '02'}
            - {CCODE: '03', CNAME: '03'}
            - {CCODE: '04', CNAME: '04'}
            - {CCODE: '05', CNAME: '05'}
            - {CCODE: '06', CNAME: '06'}
            - {CCODE: '07', CNAME: '07'}
            - {CCODE: '08', CNAME: '08'}
            - {CCODE: '09', CNAME: '09'}
            - {CCODE: '10', CNAME: '10'}
            - {CCODE: '11', CNAME: '11'}
            - {CCODE: '12', CNAME: '12'}
      - element_id: journal_list_status_label
        type: label
        text: "Status"
      - element_id: journal_list_status_combobox
        type: combobox
        text: VAR_JOURNAL_STATUS_OPTIONS.CNAME
        value: VAR_JOURNAL_STATUS_OPTIONS.CCODE
        field: VAR_FILTER.CSTATUS
        options:
          - run_stored_procedure:
              name: RSP_GS_GET_GSB_CODE_LIST
              parameters:
                - 'BIMASAKTI'
                - VAR_COMPANY_ID
                - '_GL_JOURNAL_STATUS'
                - VAR_LANGUAGE_ID
              save_to: VAR_JOURNAL_STATUS_OPTIONS
          - add_option:
              to: VAR_JOURNAL_STATUS_OPTIONS
              data:
                CCODE: ''
                CNAME: 'All'
      - element_id: journal_list_search_textbox
        type: textbox
        field: VAR_FILTER.CSEARCH_TEXT
        validations:
          - max_length: 20
      - element_id: journal_list_search_button
        type: button
        text: "Search"
        events:
          on_click:
            - run_process: SEARCH_PROCESS
      - element_id: journal_list_show_all_button
        type: button
        text: "Show All"
        events:
          on_click:
            - run_process: SHOW_ALL_PROCESS
      - element_id: journal_list_journal_list_grid
        type: grid
        field: VAR_JOURNAL_LIST
        batch: true
        mode: VIEW
        events:
          on_selected_row_changed:
            - run_process: REFRESH_JOURNAL_DETAIL_PROCESS
        columns:
          - column: CREC_ID
            header: Journal ID
            type: Textbox
            validations: Hidden
          - column: LALLOW_APPROVE
            header: Allow Approve
            type: Textbox
            validations: Hidden
          - column: CREF_PRD
            header: Journal Period
            type: Textbox
            validations: Hidden
          - column: CSTATUS
            header: Status Code
            type: Textbox
            validations: Hidden
          - column: CREF_NO
            header: Reference No.
            type: Textbox
            validations: Disabled
          - column: CREF_DATE
            header: Reference Date
            type: DateTime
            validations: Disabled
          - column: CREVERSE_DATE
            header: Reversing Date
            type: DateTime
            validations: Disabled
          - column: CDOC_NO
            header: Document No.
            type: Textbox
            validations: Disabled
          - column: CTRANS_DESC
            header: Description
            type: Textbox
            validations: Disabled
          - column: CCURRENCY_CODE
            header: Currency
            type: Textbox
            validations: Disabled
          - column: NTRANS_AMOUNT
            header: Amount
            type: Numeric Textbox
            validations: Disabled
          - column: CSTATUS_NAME
            header: Status
            type: Textbox
            validations: Disabled
          - column: CUPDATE_BY
            header: Updated By
            type: Textbox
            validations: Disabled
          - column: DUPDATE_DATE
            header: Updated Date
            type: DateTime
            validations: Disabled
          - column: CCREATE_BY
            header: Created By
            type: Textbox
            validations: Disabled
          - column: DCREATE_DATE
            header: Created Date
            type: DateTime
            validations: Disabled
      - element_id: journal_list_journal_detail_grid
        type: grid
        field: VAR_JOURNAL_DETAIL
        mode: VIEW
        columns:
          - column: CREC_ID
            header: Journal Detail ID
            type: Textbox
            validations: Hidden
          - column: INO
            header: No.
            type: Numeric Textbox
            validations: Disabled
          - column: CGLACCOUNT_NO
            header: Account No.
            type: Textbox
            validations: Disabled
          - column: CGLACCOUNT_NAME
            header: Account Name
            type: Textbox
            validations: Disabled
          - column: CCENTER_NAME
            header: Center
            type: Textbox
            validations: Disabled
          - column: CDBCR
            header: D/C
            type: Textbox
            validations: Disabled
          - column: NDEBIT
            header: Debit
            type: Numeric Textbox
            validations:
              conditions:
                operator: equals
                field: CDBCR
                value: "D"
                true: Disabled
                false: Hidden
          - column: NCREDIT
            header: Credit
            type: Numeric Textbox
            validations:
              conditions:
                operator: equals
                field: CDBCR
                value: "C"
                true: Disabled
                false: Hidden
          - column: CDETAIL_DESC
            header: Description
            type: Textbox
            validations: Disabled
          - column: CDOCUMENT_NO
            header: Voucher No.
            type: Textbox
            validations: Disabled
          - column: CDOCUMENT_DATE
            header: Voucher Date
            type: DateTime
            validations: Disabled
          - column: NLDEBIT
            header: DB (Local)
            type: Numeric Textbox
            validations:
              conditions:
                operator: equals
                field: CDBCR
                value: "D"
                true: Disabled
                false: Hidden
          - column: NLCREDIT
            header: CR (Local)
            type: Numeric Textbox
            validations:
              conditions:
                operator: equals
                field: CDBCR
                value: "C"
                true: Disabled
                false: Hidden
          - column: NBDEBIT
            header: DB (Base)
            type: Numeric Textbox
            validations:
              conditions:
                operator: equals
                field: CDBCR
                value: "D"
                true: Disabled
                false: Hidden
          - column: NBCREDIT
            header: CR (Base)
            type: Numeric Textbox
            validations:
              conditions:
                operator: equals
                field: CDBCR
                value: "C"
                true: Disabled
                false: Hidden
      - element_id: journal_list_approve_button
        type: button
        text: "Approve"
        validations:
          conditions:
            operator: and
            conditions:
                operator: equals
                field:
                  source: selected_row
                  variable: VAR_JOURNAL_LIST
                  column: CSTATUS
                value: "10"
                operator: equals
                field: VAR_GSM_TRANSACTION_CODE.LAPPROVAL_FLAG
                value: true
            true: Enabled
            false: Disabled
        events:
          on_click:
            - run_process: APPROVE_JOURNAL_PROCESS
      - element_id: journal_list_commit_undo_button
        type: button
        text:
          conditions:
            operator: equals
            field:
                source: selected_row
                variable: VAR_JOURNAL_LIST
                column: CSTATUS
            value: "80"
            true: "Undo"
            false: "Commit"
        validations:
          conditions:
            operator: or
            conditions:
                operator: equals
                field:
                  source: selected_row
                  variable: VAR_JOURNAL_LIST
                  column: CSTATUS
                value: "20"
                operator: group
                conditions:
                    operator: and
                    conditions:
                      operator: equals
                      field:
                        source: selected_row
                        variable: VAR_JOURNAL_LIST
                        column: CSTATUS
                      value: "80"
                      operator: not_equals
                      field: VAR_IUNDO_COMMIT_JRN
                      value: 1
                      operator: greater_or_equal
                      field: CJOURNAL_PERIOD
                      value: VAR_GL_SYSTEM_PARAM.CSOFT_PERIOD
            true: Enabled
            false: Disabled
        events:
          on_click:
            - run_process: COMMIT_JOURNAL_PROCESS
      - element_id: journal_list_rapid_approval_button
        type: button
        text: "Rapid Approval"
        validations:
          conditions:
            operator: equals
            field: VAR_GSM_TRANSACTION_CODE.LAPPROVAL_FLAG
            value: true
            true: Enabled
            false: Disabled
        events:
          on_click:
            - run_process: RAPID_APPROVAL_PROCESS
      - element_id: journal_list_rapid_commit_button
        type: button
        text: "Rapid Commit"
        events:
          on_click:
            - open_popup: POPUP_RAPID_COMMIT

    processes:
      - process_id: INITIAL_PROCESS
        category: initialization
        validations: []
        action:
          - front:
              - set_var:
                  name: VAR_TRANS_CODE
                  value: "000020"
              - set_var:
                  name: VAR_COMPANY_ID
                  value: "Login User's Company ID"
              - set_var:
                  name: VAR_USER_ID
                  value: "Login User ID"
              - set_var:
                  name: VAR_LANGUAGE_ID
                  value: "Login User's Language ID"
          - back:
              - set_var:
                  name: VAR_TODAY
                  value: "Get Property Date with function dbo.RFN_GET_DB_TODAY(VAR_COMPANY_ID)"
              - run_stored_procedure:
                  name: RSP_GL_GET_SYSTEM_PARAM
                  parameters:
                    - VAR_COMPANY_ID
                    - VAR_LANGUAGE_ID
                  save_to: VAR_GL_SYSTEM_PARAM
              - conditions:
                  operator: is_empty
                  field: VAR_GL_SYSTEM_PARAM
                  true:
                    - display_message:
                        text: "The program cannot continue because the GL System Parameter has not been set. Please configure the system parameter before proceeding"
                        buttons: [OK]
                    - close_program
              - run_stored_procedure:
                  name: RSP_GS_GET_COMPANY_INFO
                  parameters:
                    - VAR_COMPANY_ID
                  save_to: VAR_GSM_COMPANY
              - run_stored_procedure:
                  name: RSP_GS_GET_DEPT_LOOKUP_LIST
                  parameters:
                    - VAR_COMPANY_ID
                    - VAR_USER_ID
                  save_to: VAR_USER_DEPARTMENT_LIST
              - run_stored_procedure:
                  name: RSP_GS_GET_PERIOD_DT_INFO
                  parameters:
                    - VAR_COMPANY_ID
                    - VAR_GL_SYSTEM_PARAM.CCURRENT_PERIOD_YY
                    - VAR_GL_SYSTEM_PARAM.CCURRENT_PERIOD_MM
                  save_to: VAR_RESULT
                  set_var:
                    name: VAR_CCURRENT_PERIOD_START_DATE
                    value: "VAR_RESULT.CSTART_DATE"
              - run_stored_procedure:
                  name: RSP_GS_GET_PERIOD_DT_INFO
                  parameters:
                    - VAR_COMPANY_ID
                    - VAR_GL_SYSTEM_PARAM.CSOFT_PERIOD_YY
                    - VAR_GL_SYSTEM_PARAM.CSOFT_PERIOD_MM
                  save_to: VAR_RESULT
                  set_var:
                    name: VAR_CSOFT_PERIOD_START_DATE
                    value: "VAR_RESULT.CSTART_DATE"
              - run_stored_procedure:
                  name: RSP_GL_GET_SYSTEM_ENABLE_OPTION_INFO
                  parameters:
                    - VAR_COMPANY_ID
                    - "GL014001"
                  save_to: VAR_RESULT
                  set_var:
                    name: VAR_IUNDO_COMMIT_JRN
                    value: "VAR_RESULT.IOPTION"
              - run_stored_procedure:
                  name: RSP_GS_GET_TRANS_CODE_INFO
                  parameters:
                    - VAR_COMPANY_ID
                    - VAR_TRANS_CODE
                  save_to: VAR_GSM_TRANSACTION_CODE
              - run_stored_procedure:
                  name: RSP_GS_GET_PERIOD_YEAR_RANGE
                  parameters:
                    - VAR_COMPANY_ID
                    - ""
                    - ""
                  save_to: VAR_GSM_PERIOD
      - process_id: SEARCH_PROCESS
        category: other-function
        validations:
          - field: VAR_FILTER.CDEPT_CODE
            conditions:
              operator: is_empty
              field: VAR_FILTER.CDEPT_CODE
            message: "Please Select Department!"
          - field: VAR_FILTER.CSEARCH_TEXT
            conditions:
              operator: is_empty
              field: VAR_FILTER.CSEARCH_TEXT
            message: "Please input keyword to search!"
          - field: VAR_FILTER.CSEARCH_TEXT
            conditions:
              operator: less_than
              field: VAR_FILTER.CSEARCH_TEXT length
              value: 3
            message: "Minimum search keyword is 3 characters!"
        action:
          - back:
              - run_stored_procedure:
                  name: RSP_GL_SEARCH_REVERSING_LIST
                  parameters:
                    - VAR_COMPANY_ID
                    - VAR_USER_ID
                    - VAR_FILTER.CDEPT_CODE
                    - "VAR_FILTER.CJOURNAL_PERIOD_YY + VAR_FILTER.CJOURNAL_PERIOD_MM"
                    - VAR_FILTER.CSTATUS
                    - VAR_FILTER.CSEARCH_TEXT
                    - VAR_LANGUAGE_ID
                  save_to: VAR_JOURNAL_LIST
          - front:
              - conditions:
                  operator: equals
                  field: VAR_JOURNAL_LIST length
                  value: 0
                  true:
                    - display_message:
                        text: "No Data Found!"
                        buttons: [OK]
                  false:
                    - run_process: REFRESH_JOURNAL_DETAIL_PROCESS

      - process_id: SHOW_ALL_PROCESS
        category: other-function
        validations: []
        action:
          - back:
              - run_stored_procedure:
                  name: RSP_GL_SEARCH_REVERSING_LIST
                  parameters:
                    - VAR_COMPANY_ID
                    - VAR_USER_ID
                    - VAR_FILTER.CDEPT_CODE
                    - "VAR_FILTER.CJOURNAL_PERIOD_YY + VAR_FILTER.CJOURNAL_PERIOD_MM"
                    - VAR_FILTER.CSTATUS
                    - ""
                    - VAR_LANGUAGE_ID
                  save_to: VAR_JOURNAL_LIST
          - front:
              - conditions:
                  operator: equals
                  field: VAR_JOURNAL_LIST length
                  value: 0
                  true:
                    - display_message:
                        text: "No Data Found!"
                        buttons: [OK]
                  false:
                    - run_process: REFRESH_JOURNAL_DETAIL_PROCESS

      - process_id: REFRESH_JOURNAL_DETAIL_PROCESS
        category: other-function
        validations: []
        action:
          - back:
              - run_stored_procedure:
                  name: RSP_GL_GET_JOURNAL_DETAIL_LIST
                  parameters:
                    - field:
                        source: selected_row
                        variable: VAR_JOURNAL_LIST
                        column: CREC_ID
                    - VAR_LANGUAGE_ID
                  save_to: VAR_JOURNAL_DETAIL

      - process_id: APPROVE_JOURNAL_PROCESS
        category: other-function
        validations: []
        action:
          - front:
              - conditions:
                  operator: equals
                  field:
                    source: selected_row
                    variable: VAR_JOURNAL_LIST
                    column: LALLOW_APPROVE
                  value: false
                  true:
                    - display_message:
                        text: "You don't have right to approve this journal!"
                        buttons: [OK]
                    - end_process
              - display_message:
                  text: "Are you sure want to approve this journal?"
                  buttons: [Yes/No]
                  on_no: end_process
          - back:
              - run_stored_procedure:
                  name: RSP_GL_UPDATE_JOURNAL_STATUS
                  parameters:
                    - VAR_COMPANY_ID
                    - VAR_USER_ID
                    - VAR_USER_ID
                    - field:
                        source: selected_row
                        variable: VAR_JOURNAL_LIST
                        column: CREC_ID
                    - 20
                    - VAR_GL_SYSTEM_PARAM.LCOMMIT_APRJRN
                    - 0
          - front:
              - conditions:
                  operator: is_not_empty
                  field: ""
                  true:
                    - display_error_message
                  false:
                    - display_message:
                        text: "Selected Journal Approved Successfully!"
                        buttons: [OK]
                    - conditions:
                        operator: is_not_empty
                        field: VAR_FILTER.CSEARCH_TEXT
                        true:
                          - run_process: SEARCH_PROCESS
                        false:
                          - run_process: REFRESH_JOURNAL_DETAIL_PROCESS

      - process_id: COMMIT_JOURNAL_PROCESS
        category: other-function
        validations: []
        action:
          - front:
              - conditions:
                  operator: equals
                  field:
                    source: selected_row
                    variable: VAR_JOURNAL_LIST
                    column: CSTATUS
                  value: 80
                  true:
                    - display_message:
                        text: "Are you sure want to undo commit this journal?"
                        buttons: [Yes/No]
                        on_no: end_process
                  false:
                    - display_message:
                        text: "Are you sure want to commit this journal?"
                        buttons: [Yes/No]
                        on_no: end_process
          - back:
              - conditions:
                  operator: equals
                  field:
                    source: selected_row
                    variable: VAR_JOURNAL_LIST
                    column: CSTATUS
                  value: 80
                  true:
                    - conditions:
                        operator: equals
                        field: VAR_GL_SYSTEM_PARAM.IREVERSE_JRN_POST
                        value: true
                        true:
                          - run_stored_procedure:
                              name: RSP_GL_UNDO_REVERSING_JRN
                              parameters:
                                - VAR_COMPANY_ID
                                - VAR_USER_ID
                                - field:
                                    source: selected_row
                                    variable: VAR_JOURNAL_LIST
                                    column: CREC_ID
                  false:
                    - conditions:
                        operator: equals
                        field: VAR_GL_SYSTEM_PARAM.IREVERSE_JRN_POST
                        value: true
                        true:
                          - run_stored_procedure:
                              name: RSP_GL_PROCESS_REVERSING_JRN
                              parameters:
                                - VAR_COMPANY_ID
                                - VAR_USER_ID
                                - field:
                                    source: selected_row
                                    variable: VAR_JOURNAL_LIST
                                    column: CDEPT_CODE
                                - field:
                                    source: selected_row
                                    variable: VAR_JOURNAL_LIST
                                    column: CREF_NO
                                - field:
                                    source: selected_row
                                    variable: VAR_JOURNAL_LIST
                                    column: CREC_ID
              - conditions:
                  operator: equals
                  field:
                    source: selected_row
                    variable: VAR_JOURNAL_LIST
                    column: CSTATUS
                  value: 80
                  true:
                    - conditions:
                        operator: equals
                        field: VAR_GSM_TRANSACTION_CODE.LAPPROVAL_FLAG
                        value: true
                        true:
                          - set_var:
                              name: VAR_NEW_STATUS
                              value: 10
                        false:
                          - set_var:
                              name: VAR_NEW_STATUS
                              value: 0
                  false:
                    - set_var:
                        name: VAR_NEW_STATUS
                        value: 80
              - run_stored_procedure:
                  name: RSP_GL_UPDATE_JOURNAL_STATUS
                  parameters:
                    - VAR_COMPANY_ID
                    - VAR_USER_ID
                    - VAR_USER_ID
                    - field:
                        source: selected_row
                        variable: VAR_JOURNAL_LIST
                        column: CREC_ID
                    - VAR_NEW_STATUS
                    - 0
                    - conditions:
                        operator: equals
                        field:
                          source: selected_row
                          variable: VAR_JOURNAL_LIST
                          column: CSTATUS
                        value: 80
                        true: 1
                        false: 0
          - front:
              - conditions:
                  operator: is_not_empty
                  field: ""
                  true:
                    - display_error_message
                  false:
                    - conditions:
                        operator: equals
                        field:
                          source: selected_row
                          variable: VAR_JOURNAL_LIST
                          column: CSTATUS
                        value: 80
                        true:
                          - display_message:
                              text: "Selected Journal Undo Commit Successfully!"
                              buttons: [OK]
                        false:
                          - display_message:
                              text: "Selected Journal Committed Successfully!"
                              buttons: [OK]
                    - conditions:
                        operator: is_not_empty
                        field: VAR_FILTER.CSEARCH_TEXT
                        true:
                          - run_process: SEARCH_PROCESS
                        false:
                          - run_process: REFRESH_JOURNAL_DETAIL_PROCESS

      - process_id: RAPID_APPROVAL_PROCESS
        category: other-function
        validations:
          - field: VAR_FILTER.CDEPT_CODE
            conditions:
              operator: is_empty
              field: VAR_FILTER.CDEPT_CODE
            message: "Please Select Department!"
        action:
          - back:
              - run_stored_procedure:
                  name: RSP_GS_GET_ALLOW_APPROVAL_STATUS
                  parameters:
                    - VAR_COMPANY_ID
                    - VAR_TRANS_CODE
                    - VAR_FILTER.CDEPT_CODE
                    - VAR_USER_ID
                  save_to: VAR_RESULT
          - front:
              - conditions:
