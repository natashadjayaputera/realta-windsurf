              - element_id: journal_entry_total_debit_numeric_textbox
                type: numeric_textbox
                field: VAR_JOURNAL_FORM.NDEBIT_AMOUNT
                validations:
                  - disabled: true
              - element_id: journal_entry_total_credit_label
