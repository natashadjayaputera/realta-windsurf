                validations:
                  - conditions:
                      operator: not_equals
                      field: VAR_JOURNAL_FORM.CCURRENCY_CODE
                      value: VAR_GSM_COMPANY.CBASE_CURRENCY_CODE
                      true: enabled
                      false: disabled
              - element_id: journal_entry_base_currency_code_textbox
                type: textbox
                field: VAR_GSM_COMPANY.CBASE_CURRENCY_CODE
                validations:
                  - disabled: true
              - element_id: journal_entry_prelist_label
                type: label
                text: "Prelist"
              - element_id: journal_entry_prelist_numeric_textbox
                type: numeric_textbox
                field: VAR_JOURNAL_FORM._AMOUNT_AMOUNT
              - element_id: journal_entry_total_debit_label
                type: label
