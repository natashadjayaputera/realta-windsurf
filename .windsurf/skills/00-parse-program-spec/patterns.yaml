            active_mode: VAR_FORM_SAVE_MODE
            elements:
              - element_id: journal_entry_department_label
                type: label
                text: "Department"
              - element_id: journal_entry_department_code_textbox
                type: textbox
                field: VAR_JOURNAL_FORM.CDEPT_CODE
                defaults:
                  - "First value from VAR_USER_DEPARTMENT_LIST.CDEPT_CODE"
                  - conditions:
                      operator: contains
                      field: VAR_USER_DEPARTMENT_LIST.CDEPT_CODE
                      value: VAR_GL_SYSTEM_PARAM.CCLOSE_DEPT_CODE
                      true: "VAR_GL_SYSTEM_PARAM.CCLOSE_DEPT_CODE"
                      false: ""
                validations:
                  - max_length: 5
                  - upper_case: true
                  - conditions:
                      operator: equals
                      field: VAR_FORM_SAVE_MODE
                      value: "ADD"
                      true: enabled
                      false: disabled
                events:
                  on_lost_focus:
                    - search_lookup:
                        program: GSL00700
                        project: LOOKUP_GS
                        parameters:
                          - VAR_COMPANY_ID
                          - VAR_USER_ID
                          - "SearchText: VAR_JOURNAL_FORM.CDEPT_CODE"
                        save_to: VAR_RESULT
                    - conditions:
